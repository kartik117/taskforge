server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # React Router uses client-side routes (e.g. /projects/:id) -- without
        # this fallback, a hard refresh on a deep link 404s at the nginx level
        # before React ever gets a chance to render.
        try_files $uri $uri/ /index.html;
    }
}
